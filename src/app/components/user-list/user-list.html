<h2>User LIST</h2>
<button class="add-user-button" routerLink="/user-form/new">Добавить пользователя</button>

<div class="user-cards">
  <div *ngFor="let user of users" class="user-card">
    <h3>{{ user.fullName }}</h3>
    <p>Email: {{ user.email }}</p>
    <p>Дата регистрации: {{ user.registrationDate | date }}</p>
    <button [routerLink]="['/user-profile', user.id]">Подробнее</button>
    <button [routerLink]="['/user-form', user.id]">Редактировать</button>
    <button (click)="deleteUser(user.id!)">Удалить</button>
  </div>
</div>
