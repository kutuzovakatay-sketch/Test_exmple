<div class="form-container">
  <h2>{{ isEditMode ? 'Редактировать пользователя' : 'Добавить пользователя' }}</h2>

  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">

    <!-- ФИО-->
    <div class="form-group">
      <label for="fullName">ФИО *</label>
      <input id="fullName" type="text" formControlName="fullName" class="form-control">
      <div *ngIf="f['fullName'].invalid && f['fullName'].touched" class="error">
        <span *ngIf="f['fullName'].errors?.['required']">Обязательное поле</span>
        <span *ngIf="f['fullName'].errors?.['minlength']">Минимум 2 символа</span>
      </div>
    </div>

    <!-- Email-->
    <div class="form-group">
      <label for="email">Email *</label>
      <input id="email" type="email" formControlName="email" class="form-control">
      <div *ngIf="f['email'].invalid && f['email'].touched" class="error">
        <span *ngIf="f['email'].errors?.['required']">Обязательное поле</span>
        <span *ngIf="f['email'].errors?.['email']">Введите корректный email</span>
      </div>
    </div>

    <!-- Дата рождения-->
    <div class="form-group">
      <label for="dateBirth">Дата рождения *</label>
      <input id="dateBirth" type="date" formControlName="dateBirth" class="form-control">
      <div *ngIf="f['dateBirth'].invalid && f['dateBirth'].touched" class="error">
        <span *ngIf="f['dateBirth'].errors?.['required']">Обязательное поле</span>
      </div>
    </div>

    <!-- Образование-->
    <div class="form-group">
      <label for="education">Образование *</label>
      <input id="education" type="text" formControlName="education" class="form-control">
      <div *ngIf="f['education'].invalid && f['education'].touched" class="error">
        <span *ngIf="f['education'].errors?.['required']">Обязательное поле</span>
      </div>
    </div>

    <!-- Возраст-->
    <div class="form-group">
      <label for="age">Возраст *</label>
      <input id="age" type="number" formControlName="age" class="form-control">
      <div *ngIf="f['age'].invalid && f['age'].touched" class="error">
        <span *ngIf="f['age'].errors?.['required']">Обязательное поле</span>
      </div>
    </div>

    <!-- Дата регистрации-->
    <div class="form-group">
      <label for="registrationDate">Дата регистрации</label>
      <input id="registrationDate" type="date" formControlName="registrationDate" class="form-control">
      <small class="hint">Заполняется автоматически</small>
    </div>


    <div class="button-group">
      <button type="submit" [disabled]="userForm.invalid" class="btn-save">
        {{ isEditMode ? 'Сохранить' : 'Создать' }}
      </button>
      <button type="button" routerLink="/users" class="btn-cancel">Отмена</button>
    </div>
  </form>
</div>
